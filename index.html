<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Radio DJ Goku 24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#000 url("https://i.imgur.com/d60FjQP.png") center/cover fixed;
      color:#f9fafb;
    }
    body{display:flex;flex-direction:column;}

    /* HEADER: logo + barra menu sulla stessa riga */
    header{
      padding:6px 16px 8px;
      background:transparent;
    }
    .header-row{
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }
    .header-logo{
      flex:0 0 60px;
      display:flex;
      align-items:center;
    }
    .header-logo img{
      width:60px;
      height:60px;
      border-radius:8px;
      object-fit:cover;
    }
    .menu-bar{
      flex:1;
      margin-left:8px;
      height:30px;
      background:linear-gradient(90deg,#b45309,#9ca3af,#4b5563,#6366f1);
      display:flex;
      align-items:center;
      justify-content:space-around;
    }
    .menu-item{
      flex:1;
      text-align:center;
      color:#000;
      text-decoration:none;
      font-size:14px;
      font-family:"Times New Roman",serif;
    }
    .menu-item.active{text-decoration:underline;}

    main{
      flex:1;
      padding:14px 10px 16px;
    }

    .block-title{
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:6px;
      color:#e5e7eb;
    }
    .block iframe{
      width:100%;
      border:none;
      border-radius:8px;
      background:#000;
      box-shadow:0 10px 25px rgba(0,0,0,.75);
    }

    /* RIGA 1: NEWS + OROLOGIO (affiancati) */
    .top-row{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:12px;
      margin-bottom:8px;
    }

    .news-slot{
      height:30px;
      overflow:hidden;
      margin-top:0px;      /* ↑↓ sposti le NEWS */
      margin-left:0px;     /* ←→ */
      margin-right:0px;
    }
    .news-slot iframe{
      width:100%;
      height:100%;
      border:none;
      background:transparent;
    }

    .clock-slot{
      height:25px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      overflow:hidden;
      margin-top:0px;      /* ↑↓ sposti OROLOGIO */
      margin-left:0px;     /* ←→ */
      margin-right:80px;
    }
    .clock-wrap{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:16px;
      padding:0 10px;
    }
    .date-line{
      font-size:18px;
      font-weight:500;
    }
    .time-line{
      font-size:26px;
      font-weight:700;
    }

    /* RIGA 2–3: PLAYER + CHAT + METEO + SCARICA APP */
    .layout{
      display:grid;
      grid-template-columns:2fr 1fr;
      grid-template-rows:auto auto;
      gap:12px;
    }

    /* PLAYER – sposta tutto il blocco player */
    .player-block{
      grid-column:1/2;
      grid-row:1/2;
      margin-top:20px;      /* ↑↓ sposti PLAYER */
      margin-left:0px;     /* ←→ */
      margin-right:0px;
    }
    .player-block iframe{
      height:260px;
    }

    /* CHAT sotto il player – spostabile */
    .chat-block{
      grid-column:1/2;
      grid-row:2/3;
      margin-top:40px;      /* ↑↓ sposti CHAT */
      margin-left:0px;
      margin-right:0px;
    }
    .chat-block iframe{
      height:450px;
    }

    /* METEO – blocco spostabile indipendente */
    .weather-block{
      grid-column:2/3;
      grid-row:1/2;
      display:flex;
      flex-direction:column;
      margin-top:62px;      /* ↑↓ sposti METEO+SCARICA insieme */
      margin-left:30px;
      margin-right:0px;
    }
    .weather-iframe-wrap{
      flex:0 0 220px;
      overflow:hidden;
      display:flex;
      margin-top:0px;      /* offset solo METEO sopra/sotto */
      margin-left:0px;
      margin-right:0px;
    }
    .weather-iframe-wrap iframe{
      width:100%;
      height:100%;
      border:none;
      border-radius:8px;
      background:#000;
      box-shadow:0 10px 25px rgba(0,0,0,.75);
    }

 /* SCARICA LA NOSTRA APP – spostabile sotto il meteo */
.download-block{
  grid-column:2/3;
  grid-row:2/3;
  margin-top:100px;
  margin-left:0px;
  margin-right:0px;
}

/* qui lo rendiamo più grande */
.download-inner{
  width:80%;              /* più stretto dell'intera colonna (80% o meno) */
  max-width:450px;        /* larghezza massima fissa */
  min-height:300px;
  margin:0 auto;          /* centra il riquadro stretto */
  padding:16px 20px;
  background:linear-gradient(90deg,#ef4444,#f97316);
  border-radius:12px;
  text-align:center;
  color:#fff7ed;
  box-shadow:0 10px 25px rgba(0,0,0,.8);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}
.download-text{
  font-size:25px;            /* leggermente più grande */
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.12em;
}
.download-inner button{
  padding:10px 50px;         /* bottone più grande */
  border-radius:999px;
  border:none;
  background:#111827;
  color:#f9fafb;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
}

    @media (max-width:768px){
      header{
        padding:10px 10px 6px;
      }
      .header-row{
        flex-direction:column;
        align-items:center;
      }
      .menu-bar{
        margin-left:0;
        margin-top:6px;
        width:100%;
      }
      main{padding:10px 8px 14px;}

      .top-row{
        grid-template-columns:1fr;
      }

      .layout{
        grid-template-columns:1fr;
        grid-template-rows:auto;
      }
      .player-block,
      .chat-block,
      .weather-block,
      .download-block{
        grid-column:1/2!important;
        grid-row:auto!important;
      }
      .player-block iframe{
        height:230px;
      }
      .chat-block iframe{
        height:200px;
      }
      .weather-iframe-wrap{
        flex:0 0 230px;
      }
      .weather-iframe-wrap iframe{
        height:230px;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="header-row">
    <div class="header-logo">
      <img src="https://i.imgur.com/D3TIKdj.jpeg" alt="Logo DJ Goku 24">
    </div>
    <div class="menu-bar">
  <a href="/index.html" class="menu-item active">HOME</a>
      <a href="https://www.twitch.tv/djgoku24" class="menu-item">Canale Twitch</a>
    <a href="/tv.html" class="menu-item">TV</a>
  </div>
</header>

<main id="home">

  <!-- NEWS + OROLOGIO -->
  <div class="top-row">
    <div class="news-slot">
      <iframe src="https://www.agi.it/embed.html"></iframe>
    </div>

    <div class="clock-slot">
      <div class="clock-wrap">
        <div class="date-line" id="clock-date"></div>
        <div class="time-line" id="clock-time"></div>
      </div>
    </div>
  </div>

  <!-- PLAYER + CHAT + METEO + SCARICA -->
  <div class="layout">
    <!-- PLAYER -->
    <section class="block player-block">
      <div class="block-title">In onda adesso</div>
      <iframe src="https://players.rcast.net/oneplayer/200201"
              frameborder="0" scrolling="no" allow="autoplay"></iframe>
      <div style="overflow:hidden; height:0; width:0;">
        <a href="https://www.rcast.net" title="Internet Radio Hosting">RCAST.NET</a>
      </div>
    </section>

    <!-- CHAT -->
    <section class="block chat-block">
      <div class="block-title">Chat DJ Goku 24</div>
      <iframe src="https://djgoku24.chatango.com/IFRAME-LINK-QUI"></iframe>
    </section>

    <!-- METEO -->
    <section class="block weather-block">
      <div class="weather-iframe-wrap">
        <div id="ww_50bc6b5ecde95" v='1.3' loc='id' a='{"t":"horizontal","lang":"it","sl_lpl":1,"ids":["wl7981"],"font":"Times","sl_ics":"one_a","sl_sot":"celsius","cl_bkg":"image","cl_font":"#FFFFFF","cl_cloud":"#FFFFFF","cl_persp":"#81D4FA","cl_sun":"#FFC107","cl_moon":"#FFC107","cl_thund":"#FF5722"}'>
          Altre previsioni:
          <a href="https://oneweather.org/rome/30_days/" id="ww_50bc6b5ecde95_u" target="_blank">Rome weather 30 days</a>
        </div>
        <script async src="https://app3.weatherwidget.org/js/?id=ww_50bc6b5ecde95"></script>
      </div>
    </section>

    <!-- SCARICA APP -->
    <section class="download-block">
      <div class="download-inner">
        <div class="download-text">
          Scarica la nostra app solo per Android e ascoltaci ovunque
        </div>
        <button onclick="window.location.href='LINK-APK-O-PLAYSTORE'">
          Scarica
        </button>
      </div>
    </section>
  </div>
</main>

<section id="twitch"></section>
<section id="tv"></section>

<script>
  function updateClock(){
    const now = new Date();
    const days = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
    const dName = days[now.getDay()];
    const d  = String(now.getDate()).padStart(2,"0");
    const m  = String(now.getMonth()+1).padStart(2,"0");
    const y  = now.getFullYear();
    const hh = String(now.getHours()).padStart(2,"0");
    const mm = String(now.getMinutes()).padStart(2,"0");
    const ss = String(now.getSeconds()).padStart(2,"0");

    document.getElementById("clock-date").textContent =
      dName + " " + d + " / " + m + " / " + y;
    document.getElementById("clock-time").textContent =
      hh + ":" + mm + ":" + ss;
  }
  updateClock();
  setInterval(updateClock,1000);
  
 
</script>

</body>
</html>
